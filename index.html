        /* --- 启动按钮 (像素级居中 + 呼吸光晕) --- */
        #start-btn {
            position: absolute;
            inset: 0;
            margin: auto;
            width: fit-content;
            height: fit-content;
            padding: 22px 55px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 60px;
            color: #d6336c;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 3px;
            white-space: nowrap;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 0 0 rgba(214, 51, 108, 0.4), 0 10px 30px rgba(214, 51, 108, 0.2);
            animation: breathe 2s ease-in-out infinite;
            transition: all 0.3s ease;
        }
        #start-btn:active { transform: scale(0.95); animation: none; }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 0 rgba(214, 51, 108, 0.4), 0 10px 30px rgba(214, 51, 108, 0.2); }
            50% { box-shadow: 0 0 0 15px rgba(214, 51, 108, 0), 0 10px 30px rgba(214, 51, 108, 0.3); }
        }

        /* --- 气泡容器 --- */
        .bubble-container {
            position: absolute; inset: 0;
            padding: 60px 15px 30px;
            display: flex; flex-direction: column; justify-content: flex-end;
            gap: 10px;
            pointer-events: none; z-index: 10;
            overflow: hidden;
        }
        .bubble {
            max-width: 78%; padding: 12px 18px;
            border-radius: 22px; font-size: 15px; line-height: 1.6;
            opacity: 0; transform: translateY(15px) scale(0.95);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            word-wrap: break-word;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        /* 左侧 = 利利的回应 */
        .bubble.left {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.88);
            color: #444; border-bottom-left-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        /* 右侧 = 你对利利说的情话 */
        .bubble.right {
            align-self: flex-end;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff; border-bottom-right-radius: 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.08);
            box-shadow: 0 2px 12px rgba(255, 154, 158, 0.25);
        }
        @keyframes popIn { to { opacity: 1; transform: translateY(0) scale(1); } }
        .bubble.vanish {
            transition: all 0.8s ease-in !important;
            opacity: 0 !important; transform: translateY(-40px) scale(0.8) !important;
        }

        /* --- 烟花画布 --- */
        #fireworks-canvas {
            position: absolute; inset: 0;
            z-index: 5; pointer-events: none;
            opacity: 0; transition: opacity 1.2s ease;
        }

</head>

    ["我会分享你🤝", "你是我所有快乐的来源🎉"],
    ["我会传播你📡", "把你的好告诉每一个人🌟"],
    ["我会弘扬你📢", "你的美好值得被所有人看见✨"],
    ["我会传承你🔄", "我们的爱会一直延续下去♾️"],
    ["我会延续你♾️", "爱你，是我这辈子不会停下的事💕"]
];

// ==================== 配置区 ====================
const CONFIG = {
    bubbleDuration: 240,   // 气泡阶段时长(秒) = 4分钟
    fireworkDuration: 48,  // 烟花持续时长(秒)
    pauseDuration: 10,     // 音乐暂停时长(秒)
    spawnRate: 800         // 气泡生成间隔(ms)
};

// ==================== 全局状态 ====================
let shuffledDialogues = [];
let dialogueIndex = 0;
let isRunning = false;
let startTime = 0;
let rafId = null;
let bubbleTimer = null;
let replyTimer = null;

// DOM
const startBtn = document.getElementById('start-btn');
const bgm = document.getElementById('bgm');
const bubbleArea = document.getElementById('bubble-area');
const canvas = document.getElementById('fireworks-canvas');
const ctx = canvas.getContext('2d');

// ==================== Fisher-Yates 洗牌 ====================
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// ==================== 对话式气泡系统 ====================
function createDialoguePair() {
    if (!isRunning) return;

    if (dialogueIndex >= shuffledDialogues.length) {
        shuffledDialogues = shuffle(DIALOGUES);
        dialogueIndex = 0;
    }

    const [myLine, replyLine] = shuffledDialogues[dialogueIndex++];

    // 先显示你的情话（右侧）
    const myBubble = document.createElement('div');
    myBubble.className = 'bubble right';
    myBubble.innerText = myLine;
    bubbleArea.appendChild(myBubble);

    // 延迟后显示利利的回应（左侧）
    replyTimer = setTimeout(() => {
        if (!isRunning) return;
        const replyBubble = document.createElement('div');
        replyBubble.className = 'bubble left';
        replyBubble.innerText = replyLine;
        bubbleArea.appendChild(replyBubble);

        // 保持屏幕内最多10条
        while (bubbleArea.children.length > 10) {
            bubbleArea.removeChild(bubbleArea.firstChild);
        }
    }, 600 + Math.random() * 400);

    // 下一组对话
    const next = CONFIG.spawnRate + (Math.random() * 400 - 200);
    bubbleTimer = setTimeout(createDialoguePair, next + 700);
}

function clearBubbles() {
    clearTimeout(bubbleTimer);
    clearTimeout(replyTimer);
    const bs = bubbleArea.querySelectorAll('.bubble');
    bs.forEach((b, i) => setTimeout(() => b.classList.add('vanish'), i * 40));
    setTimeout(() => { bubbleArea.innerHTML = ''; }, 1200);
}

// ==================== 烟花引擎 ====================
let particles = [];
let fireworksActive = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
    constructor(x, y, hue) {
        this.x = x; this.y = y;
        this.hue = hue + (Math.random() * 40 - 20);
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1;
        this.decay = Math.random() * 0.012 + 0.006;
        this.gravity = 0.04;
        this.friction = 0.97;
    }
    update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
    }
    draw(c) {
        c.save();
        c.globalAlpha = this.alpha;
        c.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
        c.beginPath();
        c.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
        c.fill();
        c.restore();
    }
}

function explode(x, y) {
    const hue = Math.random() * 360;
    for (let i = 0; i < 70; i++) particles.push(new Particle(x, y, hue));
}

function animateFireworks() {
    if (!fireworksActive && particles.length === 0) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'lighter';

    if (fireworksActive && Math.random() < 0.08) {
        explode(Math.random() * canvas.width, Math.random() * canvas.height * 0.5 + canvas.height * 0.1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }
    rafId = requestAnimationFrame(animateFireworks);
}

// ==================== 主时间轴 ====================
function tick() {
    if (!isRunning) return;
    const elapsed = (Date.now() - startTime) / 1000;

    if (elapsed >= CONFIG.bubbleDuration && !fireworksActive && particles.length === 0) {
        clearBubbles();
        document.body.classList.add('night-mode');
        canvas.style.opacity = '1';
        fireworksActive = true;
        animateFireworks();
    }

    if (elapsed >= CONFIG.bubbleDuration + CONFIG.fireworkDuration && fireworksActive) {
        fireworksActive = false;
        cancelAnimationFrame(rafId);
        setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
            canvas.style.opacity = '0';
            document.body.classList.remove('night-mode');
            bgm.pause();
        }, 1500);
    }

    if (elapsed >= CONFIG.bubbleDuration + CONFIG.fireworkDuration + CONFIG.pauseDuration + 1.5) {
        startTime = Date.now();
        shuffledDialogues = shuffle(DIALOGUES);
        dialogueIndex = 0;
        bgm.currentTime = 0;
        bgm.play().catch(() => {});
        createDialoguePair();
    }

    requestAnimationFrame(tick);
}

// ==================== 启动入口 ====================
startBtn.addEventListener('click', () => {
    startBtn.style.opacity = '0';
    startBtn.style.pointerEvents = 'none';
    setTimeout(() => startBtn.style.display = 'none', 300);

    bgm.volume = 0.6;
    bgm.play().catch(e => console.log('Safari autoplay blocked:', e));

    shuffledDialogues = shuffle(DIALOGUES);
    dialogueIndex = 0;
    isRunning = true;
    startTime = Date.now();
    createDialoguePair();
    requestAnimationFrame(tick);
});
</script>
</body>
</html>

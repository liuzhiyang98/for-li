<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💌 To 利利</title>
    <style>
        /* --- 基础重置与字体 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffdee9 100%);
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            touch-action: none; /* 禁止浏览器默认的手势操作，防止误触 */
        }

        /* --- 烟花画布 (置于最底层) --- */
        #fireworks-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; /* 关键：放在最底层，绝不挡按钮 */
            pointer-events: none; /* 让点击穿透画布 */
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* --- 气泡容器 --- */
        #bubble-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* 容器不挡点击，让子元素自己处理 */
        }

        /* --- 单个气泡样式 --- */
        .bubble {
            position: absolute;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            color: #555;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2);
            max-width: 75%;
            word-wrap: break-word;
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: all 0.8s ease;
        }

        /* 左右分布样式 */
        .bubble.left {
            left: 5%;
            border-bottom-left-radius: 4px;
            background: rgba(255, 255, 255, 0.9);
        }
        .bubble.right {
            right: 5%;
            border-bottom-right-radius: 4px;
            background: rgba(255, 240, 245, 0.95);
            color: #d63384;
        }

        /* 消失动画类 */
        .bubble.vanish {
            opacity: 0 !important;
            transform: translateY(-50px) scale(0.5) !important;
            filter: blur(10px);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* --- 底部控制区 --- */
        .controls {
            position: absolute;
            bottom: 40px;
            left: 0; width: 100%;
            text-align: center;
            z-index: 100; /* 最高层级，确保可点 */
            pointer-events: auto; /* 恢复点击 */
        }

        /* 音乐图标 */
        .music-icon {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 24px;
            z-index: 100;
            cursor: pointer;
            animation: spin 4s linear infinite;
            pointer-events: auto;
        }
        .music-icon.paused { animation-play-state: paused; opacity: 0.5; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 触发按钮 */
        #start-btn {
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4);
            cursor: pointer;
            outline: none;
            /* Safari 专用优化 */
            -webkit-appearance: none;
            touch-action: manipulation;
            transition: transform 0.2s;
        }

        #start-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <!-- 烟花层 -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- 气泡层 -->
    <div id="bubble-container"></div>

    <!-- 音乐控制 -->
    <div class="music-icon paused" id="music-toggle">🎵</div>
    <audio id="bgm" loop preload="auto">
        <source src="./mailien.mp3" type="audio/mpeg">
    </audio>
    <!-- 按钮 -->
    <div class="controls">
        <button id="start-btn">✨ 给利利的惊喜 ✨</button>
    </div>

<script>
    // --- 1. 配置数据 ---
    const messages = [
        "你是我的小确幸 💜", "世界很大，我的眼里只有你 👀", 
        "记得按时吃饭呀 🍱", "利利，我想你了 💕", 
        "利利是最特别的存在 🌟", "想和你一起看日落 🌅",
        "每天都要开心哦 😊", "遇见你真好 ❤" ,
        "麦莉恩这首歌送给利利 🎶",
        "利利是最特别的存在 🌟",
        "想和你一起看星星 ✨",
        "你是我最喜欢的宝贝 🧸",
        "晚安，好梦 🌙",
        "无论发生什么，我都在 🛡",
        "喜欢你笑的样子 😊",
        "爱你三千遍 ❤",
        "期待和利利见面 ✨"
    ];

    // --- 2. 气泡生成逻辑 ---
    const container = document.getElementById('bubble-container');
    let bubbleInterval;

    function createBubble() {
        const text = messages[Math.floor(Math.random() * messages.length)];
        const bubble = document.createElement('div');
        bubble.className = `bubble ${Math.random() > 0.5 ? 'left' : 'right'}`;
        bubble.innerText = text;

        // 随机位置算法 (避开边缘和中心重叠)
        const topPos = 10 + Math.random() * 70; // 10% - 80% 高度
        bubble.style.top = `${topPos}%`;
        
        // 简单的防重叠微调
        if(bubble.classList.contains('left')) {
            bubble.style.left = `${5 + Math.random() * 10}%`;
        } else {
            bubble.style.right = `${5 + Math.random() * 10}%`;
        }

        container.appendChild(bubble);

        // 限制屏幕上的气泡数量，防止太多太乱
        if (container.children.length > 12) {
            container.removeChild(container.firstChild);
        }
    }

    // 初始生成几个
    for(let i=0; i<5; i++) setTimeout(createBubble, i*300);
    // 持续生成
    bubbleInterval = setInterval(createBubble, 1200);


    // --- 3. 音乐控制 ---
    const musicBtn = document.getElementById('music-toggle');
    const bgm = document.getElementById('bgm');
    let isPlaying = false;

    musicBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // 防止冒泡
        if (isPlaying) {
            bgm.pause();
            musicBtn.classList.add('paused');
        } else {
            bgm.play().catch(e => console.log("需用户交互才能播放"));
            musicBtn.classList.remove('paused');
        }
        isPlaying = !isPlaying;
    });


    // --- 4. 烟花引擎 (高性能版) ---
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let fireworksActive = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.color = color;
            // 爆炸速度
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.alpha = 1;
            this.decay = Math.random() * 0.015 + 0.005; // 衰减速度
            this.gravity = 0.05; // 重力
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity; // 加上重力
            this.vx *= 0.95; // 空气阻力
            this.vy *= 0.95;
            this.alpha -= this.decay;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function createFirework(x, y) {
        const colors = ['#ff0043', '#14fc56', '#1e7fff', '#e60aff', '#ffbf36', '#ffffff'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        for (let i = 0; i < 60; i++) { // 粒子数量
            particles.push(new Particle(x, y, color));
        }
    }

    function animateFireworks() {
        if (!fireworksActive && particles.length === 0) return;

        // 拖尾效果：不完全清除画布，而是覆盖一层半透明黑
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
        // 注意：因为背景是粉色的，这里我们用一种特殊的混合模式或者简单处理
        // 为了配合粉色背景，我们不清除黑色，而是利用 globalCompositeOperation
        
        // 简单方案：直接清除，因为背景是渐变色，拖尾在亮色背景下不明显
        // 想要拖尾，必须重绘背景，但这很耗性能。
        // 妥协方案：仅对粒子做透明度衰减，不做强行拖尾，保证流畅度。
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 随机自动发射
        if (fireworksActive && Math.random() < 0.05) {
            createFirework(
                Math.random() * canvas.width, 
                Math.random() * canvas.height * 0.6 // 在上半部分爆炸
            );
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw();
            if (p.alpha <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(animateFireworks);
    }


    // --- 5. 核心交互：点击按钮后的完美转场 ---
    const startBtn = document.getElementById('start-btn');

    startBtn.addEventListener('click', () => {
        // A. 尝试播放音乐 (如果还没播)
        if (!isPlaying) {
            bgm.play().then(() => {
                isPlaying = true;
                musicBtn.classList.remove('paused');
            }).catch(e => {});
        }

        // B. 按钮消失
        startBtn.style.transition = 'all 0.5s';
        startBtn.style.opacity = '0';
        startBtn.style.transform = 'scale(0)';
        setTimeout(() => startBtn.style.display = 'none', 500);

        // C. 气泡退场动画
        const bubbles = document.querySelectorAll('.bubble');
        bubbles.forEach((b, index) => {
            setTimeout(() => {
                b.classList.add('vanish');
            }, index * 50); // 像多米诺骨牌一样依次消失
        });

        // D. 启动烟花
        setTimeout(() => {
            container.style.display = 'none'; // 彻底移除气泡层
            canvas.style.opacity = '1'; // 显示画布
            fireworksActive = true;
            
            // 先来一波大的
            createFirework(canvas.width / 2, canvas.height / 2);
            setTimeout(() => createFirework(canvas.width * 0.3, canvas.height * 0.4), 200);
            setTimeout(() => createFirework(canvas.width * 0.7, canvas.height * 0.4), 400);
            
            animateFireworks();
        }, 1000); // 等待气泡飘散一会儿
    });

</script>
</body>
</html>

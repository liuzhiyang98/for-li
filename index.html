<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💌 To 利利</title>
    <style>
        /* --- 基础设置与字体 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffdee9 100%);
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            position: relative;
        }

        /* --- 启动按钮 (解决 Safari 自动播放限制) --- */
        #start-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            color: #ff6b81; font-size: 18px; font-weight: bold;
            cursor: pointer; z-index: 1000;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        #start-btn:active { transform: translate(-50%, -50%) scale(0.95); }

        /* --- 气泡容器 --- */
        .bubble-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            padding: 20px; display: flex; flex-direction: column;
        }

        /* --- 气泡样式 --- */
        .bubble {
            max-width: 75%; padding: 12px 18px; margin-bottom: 15px;
            border-radius: 20px; font-size: 15px; line-height: 1.5;
            opacity: 0; transform: translateY(20px) scale(0.9);
            animation: floatUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            word-wrap: break-word; position: relative;
        }

        /* 左侧气泡 (世界/对方) */
        .bubble.left {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.85);
            color: #555;
            border-bottom-left-radius: 4px;
        }

        /* 右侧气泡 (利利/你) */
        .bubble.right {
            align-self: flex-end;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        @keyframes floatUp {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- 烟花画布 --- */
        #fireworks-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; /* 放在气泡下面，防止遮挡点击 */
            opacity: 0; transition: opacity 1s ease;
        }

        /* --- 转场遮罩 --- */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease; z-index: 20;
        }
    </style>
</head>
<body>

    <!-- 启动按钮 -->
    <div id="start-btn">开启我们的故事 💌</div>
    
    <!-- 黑色转场层 -->
    <div class="overlay" id="overlay"></div>
    
    <!-- 气泡区域 -->
    <div class="bubble-container" id="bubble-area"></div>
    
    <!-- 烟花画布 -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- 音乐文件 (请替换为你的 mp3 链接) -->
    <audio id="bgm" loop preload="auto">
        <source src="./mailien.mp3" type="audio/mpeg">
    </audio>

<script>
    // --- 配置区 ---
    const CONFIG = {
        bubbleDuration: 240, // 气泡展示时长 (秒) -> 4分钟
        fireworkDuration: 48, // 烟花持续时长 (秒)
        pauseDuration: 10,   // 音乐暂停时长 (秒)
        spawnRate: 1200      // 气泡生成间隔 (毫秒)
    };

    // --- 专属文案库 (不重复池) ---
    const TEXT_POOL = [
        "每天都要开心哦 😊", "利利是最特别的存在 🌟", "麦莉恩这首歌送给你",
        "遇见你真好 ❤️", "想和你一起看日落 🌇", "爱你三千遍",
        "无论发生什么，我都在 🛡️", "你是我的小确幸 💜", "喜欢你笑的样子",
        "世界很大，我的眼里只有你", "一起看星星 ✨", "记得按时吃饭呀 🍱",
        "你是我最喜欢的", "期待和利利见面", "你是我所有的少女情怀",
        "想把所有温柔都给你", "今天的风很甜，像你一样", "想做你的避风港",
        "你是我的私有浪漫", "连晚风都偏爱你", "想牵着你的手走过四季",
        "你是我藏在心底的秘密", "见到你，天气都变好了", "你是我的未完待续",
        "想把银河摘下来送你", "你是我平淡生活里的刺眼光芒", "心跳的频率是你",
        "想和你虚度时光", "你是我所有的不期而遇", "哪怕世界颠倒，我也奔向你"
    ];

    let usedTexts = []; // 记录已使用的文本
    let isRunning = false;
    let timerInterval = null;
    let bubbleTimer = null;
    
    // --- DOM 元素 ---
    const startBtn = document.getElementById('start-btn');
    const bgm = document.getElementById('bgm');
    const bubbleArea = document.getElementById('bubble-area');
    const overlay = document.getElementById('overlay');
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');

    // --- 核心逻辑：获取不重复文本 ---
    function getUniqueText() {
        if (usedTexts.length >= TEXT_POOL.length) {
            usedTexts = []; // 如果全部用完了，重置池子
        }
        let available = TEXT_POOL.filter(t => !usedTexts.includes(t));
        let text = available[Math.floor(Math.random() * available.length)];
        usedTexts.push(text);
        return text;
    }

    // --- 气泡生成器 ---
    function createBubble() {
        if (!isRunning) return;
        
        const bubble = document.createElement('div');
        bubble.className = `bubble ${Math.random() > 0.5 ? 'right' : 'left'}`;
        bubble.innerText = getUniqueText();
        
        // 随机微调位置，增加灵动感
        const randomMargin = Math.floor(Math.random() * 20);
        bubble.style.marginLeft = `${randomMargin}px`;
        bubble.style.marginRight = `${randomMargin}px`;

        bubbleArea.appendChild(bubble);

        // 保持屏幕内气泡数量不超过 8 个，防止溢出
        if (bubbleArea.children.length > 8) {
            bubbleArea.removeChild(bubbleArea.firstChild);
        }

        // 动态调整生成速度
        let nextSpawn = CONFIG.spawnRate + (Math.random() * 800 - 400);
        bubbleTimer = setTimeout(createBubble, nextSpawn);
    }

    // --- 烟花引擎 (高性能粒子系统) ---
    let particles = [];
    let fireworksActive = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.color = color;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 4 + 1;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.alpha = 1;
            this.decay = Math.random() * 0.015 + 0.005;
            this.gravity = 0.05;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity; // 重力下坠
            this.alpha -= this.decay;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function launchFirework() {
        if (!fireworksActive) return;
        const x = Math.random() * canvas.width;
        const y = canvas.height * 0.8; // 从底部发射
        const targetY = Math.random() * (canvas.height * 0.4); // 爆炸高度
        
        // 模拟上升过程（简化为直接爆炸）
        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        for (let i = 0; i < 60; i++) {
            particles.push(new Particle(x, targetY, color));
        }
    }

    function animateFireworks() {
        if (!fireworksActive && particles.length === 0) return;
        
        // 拖尾效果
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 随机发射新烟花
        if (fireworksActive && Math.random() < 0.1) {
            launchFirework();
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) particles.splice(i, 1);
        }
        
        requestAnimationFrame(animateFireworks);
    }

    // --- 主流程控制器 ---
    function startJourney() {
        startBtn.style.display = 'none';
        isRunning = true;
        bgm.play().catch(e => console.log("Audio play failed:", e));
        
        // 1. 开始气泡阶段
        createBubble();
        
        // 监控时间轴
        let elapsed = 0;
        timerInterval = setInterval(() => {
            elapsed++;
            
            // 4分钟节点：切换烟花
            if (elapsed === CONFIG.bubbleDuration) {
                transitionToFireworks();
            }
            
            // 4分48秒节点：烟花结束，音乐暂停
            if (elapsed === CONFIG.bubbleDuration + CONFIG.fireworkDuration) {
                endFireworksAndPause();
            }
            
            // 4分58秒节点：恢复音乐，开启新一轮
            if (elapsed === CONFIG.bubbleDuration + CONFIG.fireworkDuration + CONFIG.pauseDuration) {
                resetAndLoop();
            }
        }, 1000);
    }

    function transitionToFireworks() {
        clearTimeout(bubbleTimer);
        bubbleArea.innerHTML = ''; // 清空气泡
        overlay.style.opacity = '1'; // 背景变黑
        
        setTimeout(() => {
            canvas.style.opacity = '1';
            fireworksActive = true;
            animateFireworks();
        }, 1000);
    }

    function endFireworksAndPause() {
        fireworksActive = false;
        bgm.pause();
        
        // 慢慢淡出烟花
        setTimeout(() => {
            canvas.style.opacity = '0';
            overlay.style.opacity = '0'; // 恢复背景
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
        }, 2000);
    }

    function resetAndLoop() {
        usedTexts = []; // 重置文案池，实现新一轮不重复
        bgm.currentTime = 0;
        bgm.play();
        createBubble();
    }

    // --- 启动监听 ---
    startBtn.addEventListener('click', startJourney);

</script>
</body>
</html>

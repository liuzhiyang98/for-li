<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💌 To 利利</title>
    <style>
        /* 这里是样式表，负责长什么样 */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fff0f3 0%, #ffdee9 100%); /* 粉色背景 */
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 禁止滚动 */
            font-family: "Microsoft YaHei", sans-serif;
            position: relative;
        }

        /* 音乐按钮样式 */
        .music-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 100;
            cursor: pointer;
            animation: spin 4s linear infinite; /* 旋转动画 */
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 气泡样式 */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 20px;
            border-radius: 20px;
            color: #555;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.3);
            opacity: 0; /* 初始不可见 */
            transition: opacity 1s ease; /* 慢慢浮现 */
            max-width: 80%;
            word-wrap: break-word;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>

    <!-- 音乐按钮 -->
    <div class="music-btn" id="musicBtn">🎵</div>
    
    <!-- 这里的 src 可以换成你喜欢的音乐链接 -->
    <audio id="bgm" loop preload="auto">
        <source src="./mailien.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- 核心逻辑区域 ---
        
        // 1. 你想说的话（可以在这里添加更多）
        const messages = [
            "你是我的小确幸 🍬",
            "世界很大，我的眼里只有你 👀",
            "记得按时吃饭呀 🍱",
            "利利，我想你了 💕",
            "麦莉恩这首歌送给利利 🎶",
            "利利是最特别的存在 ✨",
            "每天都要开心哦 🌞",
            "想和你一起看星星 🌟"
        ];

        // 生成气泡的函数
        function createBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // 随机选一句话
            const text = messages[Math.floor(Math.random() * messages.length)];
            bubble.innerText = text;
            
            // 随机位置 (0% - 90%)
            const x = Math.random() * 90;
            const y = Math.random() * 90;
            bubble.style.left = x + '%';
            bubble.style.top = y + '%';
            
            // 随机大小 (稍微有点变化)
            const scale = 0.8 + Math.random() * 0.4;
            bubble.style.transform = `scale(${scale})`;
            
            // 随机边框颜色
            const colors = ["#ff9a9e", "#fad0c4", "#a18cd1", "#fbc2eb"];
            bubble.style.border = `1px solid ${colors[Math.floor(Math.random() * colors.length)]}`;

            document.body.appendChild(bubble);
            
            // 让它慢慢显示出来
            setTimeout(() => {
                bubble.style.opacity = '1';
            }, 100);
        }

        // 2. 启动循环：每 800 毫秒生成一个，铺满屏幕
        setInterval(createBubble, 800);

        // 3. 音乐控制逻辑
        let isPlaying = false;
        const audio = document.getElementById('bgm');
        const btn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                btn.style.animationPlayState = 'paused'; // 停止旋转
                btn.innerHTML = '🔇'; // 变静音图标
            } else {
                audio.play().catch(e => alert("请点击屏幕交互后才能播放音乐哦"));
                btn.style.animationPlayState = 'running'; // 开始旋转
                btn.innerHTML = '🎵'; // 变音乐图标
            }
            isPlaying = !isPlaying;
        }

        // 点击按钮切换音乐
        btn.addEventListener('click', toggleMusic);
        
        // 也可以点击屏幕任意位置尝试播放（解决浏览器自动播放限制）
        document.body.addEventListener('click', function() {
            if (!isPlaying) {
                toggleMusic();
            }
        });

    </script>
</body>
</html>

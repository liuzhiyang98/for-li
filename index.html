<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💌 To 利利</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffdee9 100%);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            position: relative;
            transition: background 1.5s ease;
        }
        body.night-mode { background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e); }

        /* --- 启动按钮 --- */
        #start-btn {
            position: absolute; inset: 0; margin: auto;
            width: fit-content; height: fit-content;
            padding: 22px 55px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: 60px;
            color: #d6336c; font-size: 20px; font-weight: 700;
            letter-spacing: 3px; white-space: nowrap;
            cursor: pointer; z-index: 1000;
            box-shadow: 0 0 0 0 rgba(214,51,108,0.4), 0 10px 30px rgba(214,51,108,0.2);
            animation: breathe 2s ease-in-out infinite;
            transition: all 0.3s ease;
        }
        #start-btn:active { transform: scale(0.95); animation: none; }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 0 0 rgba(214,51,108,0.4), 0 10px 30px rgba(214,51,108,0.2); }
            50% { box-shadow: 0 0 0 15px rgba(214,51,108,0), 0 10px 30px rgba(214,51,108,0.3); }
        }

        /* --- 全屏气泡容器 (适配安全区) --- */
        .bubble-wall {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: env(safe-area-inset-left, 10px);
            right: env(safe-area-inset-right, 10px);
            bottom: env(safe-area-inset-bottom, 20px);
            pointer-events: none;
            overflow: hidden;
            transition: opacity 1s ease;
        }
        .bubble-wall.dimmed { opacity: 0.12; }

        /* --- 气泡基础样式 --- */
        .bubble {
            position: absolute;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px; line-height: 1.5;
            max-width: 65%; 
            word-wrap: break-word;
            opacity: 0;
            will-change: transform, opacity;
        }

        /* === 4种视觉样式 === */
        .style-gradient {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            box-shadow: 0 3px 12px rgba(255,154,158,0.3);
        }
        .style-glass {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #d6336c; border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 3px 12px rgba(0,0,0,0.05);
        }
        .style-outline {
            background: rgba(255,255,255,0.3);
            border: 1.5px solid #ff9a9e; color: #d6336c;
            box-shadow: 0 3px 12px rgba(255,154,158,0.15);
        }
        .style-solid {
            background: #ff6b81; color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
            box-shadow: 0 3px 12px rgba(255,107,129,0.35);
        }

        /* === 6种入场动画 === */
        @keyframes anim-pop { 
            from { opacity:0; transform:scale(0.3); } 
            to { opacity:1; transform:scale(1); } 
        }
        @keyframes anim-slideUp { 
            from { opacity:0; transform:translateY(30px) scale(0.9); } 
            to { opacity:1; transform:translateY(0) scale(1); } 
        }
        @keyframes anim-slideLeft { 
            from { opacity:0; transform:translateX(30px) scale(0.9); } 
            to { opacity:1; transform:translateX(0) scale(1); } 
        }
        @keyframes anim-spin { 
            from { opacity:0; transform:rotate(-15deg) scale(0.7); } 
            to { opacity:1; transform:rotate(0deg) scale(1); } 
        }
        @keyframes anim-bounce { 
            0% { opacity:0; transform:scale(0.3); }
            50% { opacity:1; transform:scale(1.08); }
            70% { transform:scale(0.95); }
            100% { opacity:1; transform:scale(1); }
        }
        @keyframes anim-fade { 
            from { opacity:0; transform:scale(0.95); } 
            to { opacity:1; transform:scale(1); } 
        }

        .anim-pop { animation: anim-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        .anim-slideUp { animation: anim-slideUp 0.5s ease-out forwards; }
        .anim-slideLeft { animation: anim-slideLeft 0.5s ease-out forwards; }
        .anim-spin { animation: anim-spin 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
        .anim-bounce { animation: anim-bounce 0.6s ease forwards; }
        .anim-fade { animation: anim-fade 0.7s ease forwards; }

        /* 消失动画 */
        .bubble.vanish {
            transition: all 1s ease-in !important;
            opacity: 0 !important; transform: scale(0.5) !important;
        }

        /* --- 烟花画布 --- */
        #fireworks-canvas {
            position: absolute; inset: 0;
            z-index: 9999; pointer-events: none;
            opacity: 0; transition: opacity 1.2s ease;
        }
    </style>
</head>

// ==================== 配置区 ====================
const CONFIG = {
    bubbleDuration: 240,
    fireworkDuration: 48,
    pauseDuration: 10,
    spawnRate: 700,
    maxBubbles: 55 // 略减数量，保证每个气泡有足够展示空间
};

// ==================== 全局状态 ====================
let shuffledWords = [];
let wordIndex = 0;
let zIndexCounter = 1; // ✅ Z-Index 递增计数器
let isRunning = false;
let startTime = 0;
let rafId = null;
let bubbleTimer = null;
let musicEnded = false;

const STYLES = ['style-gradient', 'style-glass', 'style-outline', 'style-solid'];
const ANIMS = ['anim-pop', 'anim-slideUp', 'anim-slideLeft', 'anim-spin', 'anim-bounce', 'anim-fade'];

// DOM
const startBtn = document.getElementById('start-btn');
const bgm = document.getElementById('bgm');
const bubbleWall = document.getElementById('bubble-wall');
const canvas = document.getElementById('fireworks-canvas');
const ctx = canvas.getContext('2d');

// ==================== 工具函数 ====================
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getNextWord() {
    if (wordIndex >= shuffledWords.length) {
        shuffledWords = shuffle(LOVE_WORDS);
        wordIndex = 0;
    }
    return shuffledWords[wordIndex++];
}

// ==================== 多模态气泡系统 ====================
function createBubble() {
    if (!isRunning) return;
    if (bubbleWall.children.length >= CONFIG.maxBubbles) return;

    const b = document.createElement('div');
    b.className = `bubble ${pick(STYLES)} ${pick(ANIMS)}`;
    b.innerText = getNextWord();

    // ✅ Z-Index 严格递增，新气泡永远盖住旧的
    b.style.zIndex = zIndexCounter++;

    // 随机位置（百分比定位，适配所有屏幕）
    b.style.top = (3 + Math.random() * 88) + '%';
    b.style.left = (3 + Math.random() * 88) + '%';

    bubbleWall.appendChild(b);

    const next = CONFIG.spawnRate + (Math.random() * 300 - 150);
    bubbleTimer = setTimeout(createBubble, next);
}

function clearBubbles() {
    clearTimeout(bubbleTimer);
    const bs = bubbleWall.querySelectorAll('.bubble');
    bs.forEach((b, i) => setTimeout(() => b.classList.add('vanish'), i * 25));
    setTimeout(() => { 
        bubbleWall.innerHTML = ''; 
        zIndexCounter = 1; // 重置层级
    }, 1500);
}

// ==================== 烟花引擎 ====================
let particles = [];
let fireworksActive = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
    constructor(x, y, hue) {
        this.x = x; this.y = y;
        this.hue = hue + (Math.random() * 40 - 20);
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1;
        this.decay = Math.random() * 0.012 + 0.006;
        this.gravity = 0.04;
        this.friction = 0.97;
    }
    update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
    }
    draw(c) {
        c.save();
        c.globalAlpha = this.alpha;
        c.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
        c.beginPath();
        c.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
        c.fill();
        c.restore();
    }
}

function explode(x, y) {
    const hue = Math.random() * 360;
    for (let i = 0; i < 70; i++) particles.push(new Particle(x, y, hue));
}

function animateFireworks() {
    if (!fireworksActive && particles.length === 0) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'lighter';
    if (fireworksActive && Math.random() < 0.08) {
        explode(Math.random() * canvas.width, Math.random() * canvas.height * 0.5 + canvas.height * 0.1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }
    rafId = requestAnimationFrame(animateFireworks);
}

// ==================== 主时间轴 ====================
function tick() {
    if (!isRunning) return;
    const elapsed = (Date.now() - startTime) / 1000;

    if (elapsed >= CONFIG.bubbleDuration && !fireworksActive && particles.length === 0) {
        clearBubbles();
        bubbleWall.classList.add('dimmed');
        document.body.classList.add('night-mode');
        canvas.style.opacity = '1';
        fireworksActive = true;
        musicEnded = false;
        animateFireworks();
    }

    if (elapsed >= CONFIG.bubbleDuration + CONFIG.fireworkDuration && fireworksActive) {
        fireworksActive = false;
        cancelAnimationFrame(rafId);
        if (!musicEnded) { bgm.pause(); musicEnded = true; }
        setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
            canvas.style.opacity = '0';
            document.body.classList.remove('night-mode');
            bubbleWall.classList.remove('dimmed');
        }, 1500);
    }

    if (elapsed >= CONFIG.bubbleDuration + CONFIG.fireworkDuration + CONFIG.pauseDuration + 1.5) {
        startTime = Date.now();
        shuffledWords = shuffle(LOVE_WORDS);
        wordIndex = 0;
        zIndexCounter = 1;
        musicEnded = false;
        bgm.currentTime = 0;
        bgm.play().catch(() => {});
        createBubble();
    }

    requestAnimationFrame(tick);
}

// ==================== 启动入口 ====================
startBtn.addEventListener('click', () => {
    startBtn.style.opacity = '0';
    startBtn.style.pointerEvents = 'none';
    setTimeout(() => startBtn.style.display = 'none', 300);

    bgm.loop = true;
    bgm.volume = 0.6;
    bgm.play().catch(e => console.log('Safari autoplay blocked:', e));

    shuffledWords = shuffle(LOVE_WORDS);
    wordIndex = 0;
    zIndexCounter = 1;
    isRunning = true;
    startTime = Date.now();
    createBubble();
    requestAnimationFrame(tick);
});
</script>

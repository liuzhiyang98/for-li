        }

        /* --- 启动按钮 (呼吸光晕 + 磨砂玻璃) --- */
        #start-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 60px;
            color: #d6336c; font-size: 20px; font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer; z-index: 1000;
            box-shadow: 0 0 0 0 rgba(214, 51, 108, 0.4), 0 10px 30px rgba(214, 51, 108, 0.2);
            animation: breathe 2s ease-in-out infinite;
            transition: all 0.3s ease;
        }
        #start-btn:active { transform: translate(-50%, -50%) scale(0.95); animation: none; }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 0 rgba(214, 51, 108, 0.4), 0 10px 30px rgba(214, 51, 108, 0.2); }
            50% { box-shadow: 0 0 0 15px rgba(214, 51, 108, 0), 0 10px 30px rgba(214, 51, 108, 0.3); }
        }

        /* --- 气泡容器 (Flex 流式防重叠) --- */
        .bubble-container {
            position: absolute; inset: 0;
            padding: 60px 15px 30px;
            display: flex; flex-direction: column; justify-content: flex-end;
            gap: 12px;
            pointer-events: none; z-index: 10;
            overflow: hidden;
        }
        .bubble {
            max-width: 78%; padding: 12px 18px;
            border-radius: 22px; font-size: 15px; line-height: 1.6;
            opacity: 0; transform: translateY(15px) scale(0.95);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            word-wrap: break-word; position: relative;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .bubble.left {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.88);
            color: #444; border-bottom-left-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .bubble.right {
            align-self: flex-end;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff; border-bottom-right-radius: 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.08);
            box-shadow: 0 2px 12px rgba(255, 154, 158, 0.25);
        }
        @keyframes popIn { to { opacity: 1; transform: translateY(0) scale(1); } }
        .bubble.vanish {
            transition: all 0.8s ease-in !important;
            opacity: 0 !important; transform: translateY(-40px) scale(0.8) !important;
        }

        /* --- 烟花画布 --- */
        #fireworks-canvas {
            position: absolute; inset: 0;
            z-index: 5; pointer-events: none;
            opacity: 0; transition: opacity 1.2s ease;
        }
    </style>

// ==================== Fisher-Yates 洗牌算法 ====================
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function getNextText() {
    if (textIndex >= shuffledTexts.length) {
        shuffledTexts = shuffle(TEXT_POOL);
        textIndex = 0;
    }
    return shuffledTexts[textIndex++];
}

// ==================== 气泡系统 ====================
function createBubble() {
    if (!isRunning) return;
    const b = document.createElement('div');
    b.className = `bubble ${Math.random() > 0.5 ? 'right' : 'left'}`;
    b.innerText = getNextText();
    bubbleArea.appendChild(b);

    // 保持屏幕内最多10条，超出移除最早的
    while (bubbleArea.children.length > 10) {
        bubbleArea.removeChild(bubbleArea.firstChild);
    }

    // 随机微调间隔 600~1000ms
    const next = CONFIG.spawnRate + (Math.random() * 400 - 200);
    bubbleTimer = setTimeout(createBubble, next);
}

function clearBubbles() {
    clearTimeout(bubbleTimer);
    const bs = bubbleArea.querySelectorAll('.bubble');
    bs.forEach((b, i) => setTimeout(() => b.classList.add('vanish'), i * 40));
    setTimeout(() => { bubbleArea.innerHTML = ''; }, 1200);
}

resizeCanvas();

class Particle {
    constructor(x, y, hue) {
        this.x = x; this.y = y;
        this.hue = hue + (Math.random() * 40 - 20);
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1;
        this.decay = Math.random() * 0.012 + 0.006;
        this.gravity = 0.04;
        this.friction = 0.97;
    }
    update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
    }
    draw(c) {
        c.save();
        c.globalAlpha = this.alpha;
        c.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
        c.beginPath();
        c.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
        c.fill();
        c.restore();
    }
}

function explode(x, y) {
    const hue = Math.random() * 360;
    for (let i = 0; i < 70; i++) particles.push(new Particle(x, y, hue));
}

function animateFireworks() {
    if (!fireworksActive && particles.length === 0) return;

    // ✅ 关键修复：每帧完全清除 + lighter混合模式
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'lighter';

    if (fireworksActive && Math.random() < 0.08) {
        explode(Math.random() * canvas.width, Math.random() * canvas.height * 0.5 + canvas.height * 0.1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }

    rafId = requestAnimationFrame(animateFireworks);
}

// ==================== 主时间轴 (rAF 驱动，防Safari后台挂起) ====================
function tick() {
    if (!isRunning) return;
    const elapsed = (Date.now() - startTime) / 1000;

    // 阶段1 → 阶段2：气泡结束，烟花开始
    if (elapsed >= CONFIG.bubbleDuration && !fireworksActive && particles.length === 0) {
        clearBubbles();
        document.body.classList.add('night-mode');
        canvas.style.opacity = '1';
        fireworksActive = true;
        animateFireworks();
    }

    // 阶段2 → 阶段3：烟花结束，音乐暂停
    if (elapsed >= CONFIG.bubbleDuration + CONFIG.fireworkDuration && fireworksActive) {
        fireworksActive = false;
        cancelAnimationFrame(rafId);
        // 等粒子自然消散
        setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
            canvas.style.opacity = '0';
            document.body.classList.remove('night-mode');
            bgm.pause();
        }, 1500);
    }

    // 阶段3 → 新一轮：暂停结束，重播音乐+气泡
    if (elapsed >= CONFIG.bubbleDuration + CONFIG.fireworkDuration + CONFIG.pauseDuration + 1.5) {
        startTime = Date.now();
        shuffledTexts = shuffle(TEXT_POOL);
        textIndex = 0;
        bgm.currentTime = 0;
        bgm.play().catch(() => {});
        createBubble();
    }

    requestAnimationFrame(tick);
}

// ==================== 启动入口 ====================
startBtn.addEventListener('click', () => {
    startBtn.style.opacity = '0';
    startBtn.style.pointerEvents = 'none';
    setTimeout(() => startBtn.style.display = 'none', 300);

    bgm.volume = 0.6;
    bgm.play().catch(e => console.log('Safari autoplay blocked:', e));

    shuffledTexts = shuffle(TEXT_POOL);
    textIndex = 0;
    isRunning = true;
    startTime = Date.now();
    createBubble();
    requestAnimationFrame(tick);
});
</script>
